services:
  api1:
    build: .
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - backend
    depends_on: []
    environment:
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "120MB"

  api2:
    build: .
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - backend
    environment:
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "120MB"

  nginx:
    image: nginx:1.25-alpine
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "110MB"

networks:
  backend:
    driver: bridge